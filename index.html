<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRYPTUS EXCHANGE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #FAFAFA;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', -apple-system, sans-serif;
  padding: 30px 20px;
}
/* Brand header */
.brand {
  text-align: center;
  margin-bottom: 28px;
}
.brand-logo {
  font-family: 'Syne', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 8px;
  color: #0D0D0D;
  text-transform: uppercase;
}
.brand-sub {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 6px;
  color: #E8621A;
  text-transform: uppercase;
  margin-top: 4px;
}
.brand-line {
  width: 40px;
  height: 3px;
  background: #E8621A;
  border-radius: 2px;
  margin: 16px auto 0;
}
/* Phone */
.phone-frame {
  width: 375px;
  height: 812px;
  border-radius: 50px;
  background: #000;
  padding: 12px;
  box-shadow:
    0 0 0 2px #333,
    0 0 0 4px #e0e0e0,
    0 30px 80px rgba(0,0,0,0.15),
    0 0 40px rgba(0,0,0,0.05);
  position: relative;
}
.phone-frame::before {
  content: '';
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 150px;
  height: 28px;
  background: #000;
  border-radius: 0 0 18px 18px;
  z-index: 10;
}
.phone-frame::after {
  content: '';
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  width: 90px;
  height: 18px;
  background: #1a1a1a;
  border-radius: 20px;
  z-index: 11;
}
.status-bar {
  position: absolute;
  top: 12px;
  left: 12px;
  right: 12px;
  height: 44px;
  border-radius: 38px 38px 0 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  z-index: 20;
  background: #0D0D0D;
}
.status-time {
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  letter-spacing: 0.3px;
}
.status-right {
  display: flex;
  align-items: center;
  gap: 5px;
}
.signal-bars {
  display: flex;
  align-items: flex-end;
  gap: 1.5px;
  height: 11px;
}
.signal-bars .bar {
  width: 3px;
  border-radius: 1px;
  background: #fff;
}
.signal-bars .bar:nth-child(1) { height: 4px; }
.signal-bars .bar:nth-child(2) { height: 6px; }
.signal-bars .bar:nth-child(3) { height: 8px; }
.signal-bars .bar:nth-child(4) { height: 11px; }
.wifi-icon { display: flex; align-items: center; }
.battery {
  display: flex;
  align-items: center;
  gap: 1px;
}
.battery-body {
  width: 22px;
  height: 11px;
  border-radius: 3px;
  border: 1.5px solid rgba(255,255,255,0.5);
  padding: 1.5px;
}
.battery-fill {
  width: 80%;
  height: 100%;
  border-radius: 1px;
  background: #fff;
}
.battery-tip {
  width: 2px;
  height: 5px;
  border-radius: 0 1px 1px 0;
  background: rgba(255,255,255,0.5);
}
.screen-wrap {
  width: 100%;
  height: 100%;
  border-radius: 38px;
  overflow: hidden;
  background: #0D0D0D;
  position: relative;
}
iframe {
  width: 100%;
  height: calc(100% - 44px);
  border: none;
  position: absolute;
  top: 44px;
  left: 0;
}
/* Footer */
.footer {
  text-align: center;
  margin-top: 24px;
}
.footer-text {
  font-size: 12px;
  color: #999;
  letter-spacing: 0.5px;
}
.footer-text span {
  color: #E8621A;
  font-weight: 600;
}
.footer-copy {
  font-size: 10px;
  color: #ccc;
  margin-top: 6px;
}
</style>
</head>
<body>
  <div>
    <div class="brand">
      <div class="brand-logo">CRYPTUS</div>
      <div class="brand-sub">EXCHANGE</div>
      <div class="brand-line"></div>
    </div>
    <div class="phone-frame">
      <div class="status-bar">
        <div class="status-time" id="status-time">9:41</div>
        <div class="status-right">
          <div class="signal-bars">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
          </div>
          <div class="wifi-icon">
            <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
              <path d="M7.5 9.5a1 1 0 110 2 1 1 0 010-2z" fill="#fff"/>
              <path d="M4.5 7.5a4.2 4.2 0 016 0" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M2 5a7.1 7.1 0 0111 0" stroke="#fff" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M0 2.5a10.5 10.5 0 0115 0" stroke="rgba(255,255,255,0.35)" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="battery">
            <div class="battery-body"><div class="battery-fill"></div></div>
            <div class="battery-tip"></div>
          </div>
        </div>
      </div>
      <div class="screen-wrap">
        <iframe src="cryptus-mini.html?v=20260402c" id="app"></iframe>
      </div>
    </div>
    <div class="footer">
      <div class="footer-text">Telegram Mini App — <span>MVP Prototype</span></div>
      <div class="footer-copy">&copy; 2026 CRYPTUS EXCHANGE</div>
    </div>
  </div>
<script>
function updateTime() {
  var now = new Date();
  var h = now.getHours();
  var m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('status-time').textContent = h + ':' + m;
}
updateTime();
setInterval(updateTime, 10000);
</script>
</body>
</html>
